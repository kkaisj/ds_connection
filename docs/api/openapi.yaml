openapi: 3.0.3
info:
  title: DC API
  version: 1.0.0
  description: 数据连接器 API 契约（MVP）
servers:
  - url: http://localhost:8000
tags:
  - name: apps
  - name: accounts
  - name: tasks
  - name: task-runs
  - name: dev
paths:
  /api/v1/apps:
    get:
      tags: [apps]
      summary: 查询连接应用列表
      parameters:
        - in: query
          name: platform
          schema:
            type: string
        - in: query
          name: keyword
          schema:
            type: string
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppsResponse"
    post:
      tags: [apps]
      summary: 上架连接应用
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppResponse"

  /api/v1/apps/{app_id}:
    get:
      tags: [apps]
      summary: 查询连接应用详情
      parameters:
        - in: path
          name: app_id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppResponse"
        "404":
          description: not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/apps/available-adapters:
    get:
      tags: [apps]
      summary: 查询已开发适配器列表（含是否已发版）
      parameters:
        - in: query
          name: keyword
          schema:
            type: string
          description: 按 adapter_key 或 display_name 搜索
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: 返回条数，默认 10
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
          description: 分页偏移量，默认 0
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailableAdaptersResponse"

  /api/v1/apps/releases:
    get:
      tags: [apps]
      summary: 查询适配器发版记录
      parameters:
        - in: query
          name: adapter_key
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
            enum: [draft, testing, released, deprecated]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleasesResponse"
    post:
      tags: [apps]
      summary: 新增或更新适配器发版记录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertReleaseRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseResponse"

  /api/v1/apps/platforms:
    get:
      tags: [apps]
      summary: 查询平台列表（含一级/二级层级）
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformsResponse"

  /api/v1/accounts:
    get:
      tags: [accounts]
      summary: 查询店铺账号列表
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountsResponse"
    post:
      tags: [accounts]
      summary: 新增店铺账号
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountRequest"
      responses:
        "201":
          description: created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountResponse"

  /api/v1/accounts/{id}:
    patch:
      tags: [accounts]
      summary: 更新店铺账号
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountResponse"

  /api/v1/tasks:
    get:
      tags: [tasks]
      summary: 查询任务列表
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TasksResponse"
    post:
      tags: [tasks]
      summary: 创建任务实例
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"

  /api/v1/tasks/{id}:
    patch:
      tags: [tasks]
      summary: 更新任务实例（参数/存储/触发）
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"

  /api/v1/tasks/{id}/run:
    post:
      tags: [tasks]
      summary: 手动触发任务执行
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "202":
          description: accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunTriggerResponse"

  /api/v1/tasks/{id}/retry:
    post:
      tags: [tasks]
      summary: 重试最近一次失败执行
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "202":
          description: accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunTriggerResponse"

  /api/v1/tasks/{id}/sidebar:
    get:
      tags: [tasks]
      summary: 获取任务侧边栏联动数据（参数/存储/日志）
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskSidebarResponse"

  /api/v1/tasks/{id}/sidebar/params:
    patch:
      tags: [tasks]
      summary: 保存任务侧边栏参数配置
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskSidebarParamsRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"

  /api/v1/tasks/{id}/sidebar/storage:
    patch:
      tags: [tasks]
      summary: 保存任务侧边栏存储配置
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskSidebarStorageRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"

  /api/v1/tasks/{id}/sidebar/logs:
    get:
      tags: [tasks]
      summary: 查询任务侧边栏指定执行批次日志
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: query
          name: run_id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunLogsResponse"

  /api/v1/task-runs:
    get:
      tags: [task-runs]
      summary: 查询任务执行记录
      parameters:
        - in: query
          name: task_id
          schema:
            type: integer
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, running, success, failed, cancelled]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskRunsResponse"

  /api/v1/task-runs/{run_id}/logs:
    get:
      tags: [task-runs]
      summary: 查询执行步骤日志
      parameters:
        - in: path
          name: run_id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunLogsResponse"

  /api/v1/dev/instructions:
    get:
      tags: [dev]
      summary: 查询我开发的指令/适配器列表
      parameters:
        - in: query
          name: keyword
          schema:
            type: string
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DevInstructionsResponse"

  /api/v1/dev/instructions/content:
    get:
      tags: [dev]
      summary: 查询指定指令代码内容
      parameters:
        - in: query
          name: relative_path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DevInstructionContentResponse"

    put:
      tags: [dev]
      summary: Save instruction source code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveInstructionRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DevInstructionContentResponse"

  /api/v1/dev/instructions/workbench/scaffold:
    post:
      tags: [dev]
      summary: Generate login/collect/adapter scaffold files
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkbenchScaffoldRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkbenchScaffoldResponse"

  /api/v1/dev/instructions/workbench/run:
    post:
      tags: [dev]
      summary: Run adapter in workbench mode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkbenchRunRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkbenchRunResponse"

  /api/v1/dev/workbench/apps/create:
    post:
      tags: [workbench]
      summary: 创建应用骨架（统一工作台入口）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkbenchScaffoldRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkbenchScaffoldResponse"

  /api/v1/dev/workbench/file:
    put:
      tags: [workbench]
      summary: 保存工作台文件（统一工作台入口）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveInstructionRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DevInstructionContentResponse"

  /api/v1/dev/workbench/run:
    post:
      tags: [workbench]
      summary: 工作台测试运行（统一工作台入口）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkbenchRunRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkbenchRunResponse"

components:
  schemas:
    BaseResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: integer
        message:
          type: string

    ErrorResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          properties:
            errors:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string

    App:
      type: object
      required: [id, name, version, status, platform_code, platform_name]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        version:
          type: string
        status:
          type: string
          enum: [active, inactive]
        platform_code:
          type: string
        platform_name:
          type: string
        is_published:
          type: boolean
        avg_runtime_minutes:
          type: integer
        ops_owner:
          type: string
        need_extra_params:
          type: boolean
        platform_preview_url:
          type: string
          nullable: true
        data_table:
          type: string
        collect_cycle:
          type: string
        metrics:
          type: string
        usage_guide:
          type: string
    Account:
      type: object
      required: [id, platform, shop_name, username_masked, status]
      properties:
        id:
          type: integer
        platform:
          type: string
        shop_name:
          type: string
        username_masked:
          type: string
        status:
          type: string
          enum: [active, inactive, disabled]

    Task:
      type: object
      required: [id, app_id, account_id, storage_config_id, notification_config_id, cron_expr, status]
      properties:
        id:
          type: integer
        app_id:
          type: integer
        account_id:
          type: integer
        storage_config_id:
          type: integer
        notification_config_id:
          type: integer
        cron_expr:
          type: string
        status:
          type: string
          enum: [enabled, paused]
        name:
          type: string
        app_name:
          type: string
        platform_code:
          type: string
        platform_name:
          type: string
        shop_name:
          type: string
        last_run_at:
          type: string
          format: date-time
          nullable: true
        last_run_status:
          type: string
          nullable: true
          description: 最近一次执行状态，来源 task_run.status
          enum: [pending, running, success, failed, cancelled]
        params:
          type: object
          additionalProperties: true

    TaskRun:
      type: object
      required: [id, task_id, trigger_type, status]
      properties:
        id:
          type: integer
        task_id:
          type: integer
        trigger_type:
          type: string
          enum: [scheduler, manual, retry]
        status:
          type: string
          enum: [pending, running, success, failed, cancelled]
        error_code:
          type: string
          nullable: true
        error_message:
          type: string
          nullable: true

    CreateAccountRequest:
      type: object
      required: [platform, shop_name, username, password]
      properties:
        platform:
          type: string
        shop_name:
          type: string
        username:
          type: string
        password:
          type: string
        extra:
          type: object
          additionalProperties: true

    UpdateAccountRequest:
      type: object
      properties:
        shop_name:
          type: string
        password:
          type: string
        status:
          type: string
          enum: [active, inactive, disabled]
        extra:
          type: object
          additionalProperties: true

    CreateTaskRequest:
      type: object
      required: [app_id, account_id, name, cron_expr, storage_config_id, notification_config_id]
      properties:
        app_id:
          type: integer
        account_id:
          type: integer
        name:
          type: string
        cron_expr:
          type: string
        params:
          type: object
          additionalProperties: true
        storage_config_id:
          type: integer
        notification_config_id:
          type: integer

    UpdateTaskRequest:
      type: object
      properties:
        name:
          type: string
        cron_expr:
          type: string
        status:
          type: string
          enum: [enabled, paused]
        storage_config_id:
          type: integer
        notification_config_id:
          type: integer
        params:
          type: object
          additionalProperties: true

    UpdateTaskSidebarParamsRequest:
      type: object
      required: [default_download_days]
      properties:
        default_download_days:
          type: integer
          minimum: 1
        extra_params:
          type: object
          additionalProperties: true

    UpdateTaskSidebarStorageRequest:
      type: object
      required: [storage_config_id]
      properties:
        storage_config_id:
          type: integer

    CreateAppRequest:
      type: object
      required: [platform_code, name, adapter_key, version, is_published, avg_runtime_minutes, ops_owner, need_extra_params, data_table, collect_cycle, metrics, usage_guide]
      properties:
        platform_code:
          type: string
          example: taobao
        name:
          type: string
          example: 订单数据采集
        adapter_key:
          type: string
          example: taobao.order_sync
        version:
          type: string
          example: 1.0.0
          description: 必须是已发版且 QA 通过的版本
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, inactive]
        is_published:
          type: boolean
        avg_runtime_minutes:
          type: integer
          example: 6
        ops_owner:
          type: string
        need_extra_params:
          type: boolean
        platform_preview_url:
          type: string
          nullable: true
        data_table:
          type: string
        collect_cycle:
          type: string
        metrics:
          type: string
        usage_guide:
          type: string
    UpdateAppRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, inactive]
        is_published:
          type: boolean
        avg_runtime_minutes:
          type: integer
        ops_owner:
          type: string
        need_extra_params:
          type: boolean
        platform_preview_url:
          type: string
          nullable: true
        data_table:
          type: string
        collect_cycle:
          type: string
        metrics:
          type: string
        usage_guide:
          type: string

    AdapterItem:
      type: object
      required: [adapter_key, platform_code, display_name, description, default_version, is_listed, latest_released_version, released_versions, listed_apps]
      properties:
        adapter_key:
          type: string
          example: taobao.order_sync
        platform_code:
          type: string
          example: taobao
        display_name:
          type: string
          example: 订单数据采集
        description:
          type: string
          example: 采集淘宝天猫订单数据
        default_version:
          type: string
          example: 1.0.0
        is_listed:
          type: boolean
          description: 是否存在可上架的已发版版本
        latest_released_version:
          type: string
          nullable: true
          description: 最新已发版版本（无则为 null）
        released_versions:
          type: array
          description: 该适配器可上架的已发版版本列表（降序）
          items:
            type: string
        listed_apps:
          type: array
          items:
            type: object
            required: [id, name, status]
            properties:
              id:
                type: integer
              name:
                type: string
              status:
                type: string
                enum: [active, inactive]

    AdapterRelease:
      type: object
      required: [id, adapter_key, version, status, qa_passed]
      properties:
        id:
          type: integer
        adapter_key:
          type: string
        display_name:
          type: string
          nullable: true
          description: 适配器中文应用名（来自注册表）
        version:
          type: string
        status:
          type: string
          enum: [draft, testing, released, deprecated]
        qa_passed:
          type: boolean
        checksum:
          type: string
          nullable: true
        release_notes:
          type: string
          nullable: true
        test_snapshot:
          type: object
          nullable: true
          additionalProperties: true
        released_by:
          type: string
          nullable: true
        released_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true

    UpsertReleaseRequest:
      type: object
      required: [adapter_key, version, status, qa_passed]
      properties:
        adapter_key:
          type: string
        version:
          type: string
        status:
          type: string
          enum: [draft, testing, released, deprecated]
        qa_passed:
          type: boolean
        checksum:
          type: string
          nullable: true
        release_notes:
          type: string
          nullable: true
        test_snapshot:
          type: object
          nullable: true
          additionalProperties: true
        released_by:
          type: string
          nullable: true

    PlatformItem:
      type: object
      required: [id, code, name, parent_id, level]
      properties:
        id:
          type: integer
        code:
          type: string
        name:
          type: string
        parent_id:
          type: integer
          nullable: true
        level:
          type: integer
          enum: [1, 2]

    DevInstructionItem:
      type: object
      properties:
        name:
          type: string
        kind:
          type: string
          enum: [adapter, login_instruction, collect_instruction]
        status:
          type: string
        updated_at:
          type: string
          format: date-time
        relative_path:
          type: string
        adapter_key:
          type: string
          nullable: true

    DevInstructionContent:
      type: object
      properties:
        relative_path:
          type: string
        content:
          type: string
        updated_at:
          type: string
          format: date-time
    AppResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/App"

    AppsResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/App"

    AccountResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/Account"

    AccountsResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Account"

    TaskResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/Task"

    TasksResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Task"

    RunTriggerResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          properties:
            data:
              type: object
              required: [task_id, run_id, queued]
              properties:
                task_id:
                  type: integer
                run_id:
                  type: integer
                queued:
                  type: boolean

    TaskRunsResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/TaskRun"

    RunLogsResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          properties:
            data:
              type: object
              properties:
                run_id:
                  type: integer
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      step:
                        type: string
                      level:
                        type: string
                        enum: [INFO, WARN, ERROR]
                      message:
                        type: string
                      ext:
                        type: object
                        additionalProperties: true
                      ts:
                        type: string
                        format: date-time

    TaskSidebarResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          properties:
            data:
              type: object
              properties:
                task_id:
                  type: integer
                params:
                  type: object
                  properties:
                    default_download_days:
                      type: integer
                    extra_params:
                      type: object
                      additionalProperties: true
                storage:
                  type: object
                  properties:
                    current_storage_id:
                      type: integer
                    current_storage:
                      type: object
                      nullable: true
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        type:
                          type: string
                        status:
                          type: string
                        config:
                          type: object
                          additionalProperties: true
                    options:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: integer
                          name:
                            type: string
                          type:
                            type: string
                          status:
                            type: string
                logs:
                  type: object
                  properties:
                    runs:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: integer
                          status:
                            type: string
                          started_at:
                            type: string
                            nullable: true
                          ended_at:
                            type: string
                            nullable: true
                          duration_ms:
                            type: integer
                            nullable: true
                          error_code:
                            type: string
                            nullable: true
                          error_message:
                            type: string
                            nullable: true
                    selected_run_id:
                      type: integer
                      nullable: true
                    items:
                      type: array
                      items:
                        type: object
                        properties:
                          step:
                            type: string
                          level:
                            type: string
                          message:
                            type: string
                          ext:
                            type: object
                            additionalProperties: true
                          ts:
                            type: string
                            nullable: true

    AvailableAdaptersResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/AdapterItem"
    ReleaseResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/AdapterRelease"
    ReleasesResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/AdapterRelease"
    PlatformsResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/PlatformItem"

    DevInstructionsResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/DevInstructionItem"

    DevInstructionContentResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/DevInstructionContent"

    SaveInstructionRequest:
      type: object
      required: [relative_path, content]
      properties:
        relative_path:
          type: string
        content:
          type: string

    WorkbenchScaffoldRequest:
      type: object
      required: [platform_code, app_slug]
      properties:
        platform_code:
          type: string
        app_slug:
          type: string
        overwrite:
          type: boolean
          default: false

    WorkbenchScaffoldResponseItem:
      type: object
      properties:
        relative_path:
          type: string
        created:
          type: boolean
        message:
          type: string

    WorkbenchScaffoldResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          properties:
            data:
              type: object
              properties:
                platform_code:
                  type: string
                app_slug:
                  type: string
                adapter_key:
                  type: string
                files:
                  type: array
                  items:
                    $ref: "#/components/schemas/WorkbenchScaffoldResponseItem"

    WorkbenchRunLogItem:
      type: object
      properties:
        time:
          type: string
          format: date-time
        message:
          type: string
        ext:
          type: object
          additionalProperties: true

    WorkbenchRunRequest:
      type: object
      properties:
        adapter_key:
          type: string
          nullable: true
        relative_path:
          type: string
          nullable: true
        credentials:
          type: object
          additionalProperties: true
        app_params:
          type: object
          additionalProperties: true
        extra:
          type: object
          additionalProperties: true

    WorkbenchRunResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          properties:
            data:
              type: object
              properties:
                success:
                  type: boolean
                rows_count:
                  type: integer
                error_code:
                  type: string
                  nullable: true
                error_message:
                  type: string
                  nullable: true
                duration_ms:
                  type: integer
                start_date:
                  type: string
                end_date:
                  type: string
                default_download_days:
                  type: integer
                runtime_init:
                  type: object
                  additionalProperties: true
                logs:
                  type: array
                  items:
                    $ref: "#/components/schemas/WorkbenchRunLogItem"
                data_preview:
                  type: array
                  items:
                    type: object
                    additionalProperties: true

