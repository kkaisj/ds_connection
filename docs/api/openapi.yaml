openapi: 3.0.3
info:
  title: DC API
  version: 1.0.0
  description: 数据连接器 API 契约（MVP）
servers:
  - url: http://localhost:8000
tags:
  - name: apps
  - name: accounts
  - name: tasks
  - name: task-runs
paths:
  /api/v1/apps:
    get:
      tags: [apps]
      summary: 查询连接应用列表
      parameters:
        - in: query
          name: platform
          schema:
            type: string
        - in: query
          name: keyword
          schema:
            type: string
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppsResponse"
    post:
      tags: [apps]
      summary: 上架连接应用
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppResponse"

  /api/v1/apps/{app_id}:
    get:
      tags: [apps]
      summary: 查询连接应用详情
      parameters:
        - in: path
          name: app_id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppResponse"
        "404":
          description: not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/apps/available-adapters:
    get:
      tags: [apps]
      summary: 查询已开发适配器列表（含是否已发版）
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailableAdaptersResponse"

  /api/v1/apps/platforms:
    get:
      tags: [apps]
      summary: 查询平台列表（含一级/二级层级）
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformsResponse"

  /api/v1/accounts:
    get:
      tags: [accounts]
      summary: 查询店铺账号列表
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountsResponse"
    post:
      tags: [accounts]
      summary: 新增店铺账号
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountRequest"
      responses:
        "201":
          description: created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountResponse"

  /api/v1/accounts/{id}:
    patch:
      tags: [accounts]
      summary: 更新店铺账号
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountResponse"

  /api/v1/tasks:
    get:
      tags: [tasks]
      summary: 查询任务列表
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TasksResponse"
    post:
      tags: [tasks]
      summary: 创建任务实例
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"

  /api/v1/tasks/{id}/run:
    post:
      tags: [tasks]
      summary: 手动触发任务执行
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "202":
          description: accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunTriggerResponse"

  /api/v1/tasks/{id}/retry:
    post:
      tags: [tasks]
      summary: 重试最近一次失败执行
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "202":
          description: accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunTriggerResponse"

  /api/v1/task-runs:
    get:
      tags: [task-runs]
      summary: 查询任务执行记录
      parameters:
        - in: query
          name: task_id
          schema:
            type: integer
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, running, success, failed, cancelled]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskRunsResponse"

  /api/v1/task-runs/{run_id}/logs:
    get:
      tags: [task-runs]
      summary: 查询执行步骤日志
      parameters:
        - in: path
          name: run_id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunLogsResponse"

components:
  schemas:
    BaseResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: integer
        message:
          type: string

    ErrorResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          properties:
            errors:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string

    App:
      type: object
      required: [id, name, version, status, platform_code, platform_name]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        version:
          type: string
        status:
          type: string
          enum: [active, inactive]
        platform_code:
          type: string
        platform_name:
          type: string
        is_published:
          type: boolean
        avg_runtime_minutes:
          type: integer
        ops_owner:
          type: string
        need_extra_params:
          type: boolean
        platform_preview_url:
          type: string
          nullable: true
        data_table:
          type: string
        collect_cycle:
          type: string
        metrics:
          type: string
        usage_guide:
          type: string
    Account:
      type: object
      required: [id, platform, shop_name, username_masked, status]
      properties:
        id:
          type: integer
        platform:
          type: string
        shop_name:
          type: string
        username_masked:
          type: string
        status:
          type: string
          enum: [active, inactive, disabled]

    Task:
      type: object
      required: [id, app_id, account_id, cron_expr, status]
      properties:
        id:
          type: integer
        app_id:
          type: integer
        account_id:
          type: integer
        cron_expr:
          type: string
        status:
          type: string
          enum: [enabled, paused]

    TaskRun:
      type: object
      required: [id, task_id, trigger_type, status]
      properties:
        id:
          type: integer
        task_id:
          type: integer
        trigger_type:
          type: string
          enum: [scheduler, manual, retry]
        status:
          type: string
          enum: [pending, running, success, failed, cancelled]
        error_code:
          type: string
          nullable: true
        error_message:
          type: string
          nullable: true

    CreateAccountRequest:
      type: object
      required: [platform, shop_name, username, password]
      properties:
        platform:
          type: string
        shop_name:
          type: string
        username:
          type: string
        password:
          type: string
        extra:
          type: object
          additionalProperties: true

    UpdateAccountRequest:
      type: object
      properties:
        shop_name:
          type: string
        password:
          type: string
        status:
          type: string
          enum: [active, inactive, disabled]
        extra:
          type: object
          additionalProperties: true

    CreateTaskRequest:
      type: object
      required: [app_id, account_id, name, cron_expr, storage_config_id, notification_config_id]
      properties:
        app_id:
          type: integer
        account_id:
          type: integer
        name:
          type: string
        cron_expr:
          type: string
        params:
          type: object
          additionalProperties: true
        storage_config_id:
          type: integer
        notification_config_id:
          type: integer

    CreateAppRequest:
      type: object
      required: [platform_code, name, adapter_key, version, is_published, avg_runtime_minutes, ops_owner, need_extra_params, data_table, collect_cycle, metrics, usage_guide]
      properties:
        platform_code:
          type: string
          example: taobao
        name:
          type: string
          example: 订单数据采集
        adapter_key:
          type: string
          example: taobao.order_sync
        version:
          type: string
          example: 1.0.0
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, inactive]
        is_published:
          type: boolean
        avg_runtime_minutes:
          type: integer
          example: 6
        ops_owner:
          type: string
        need_extra_params:
          type: boolean
        platform_preview_url:
          type: string
          nullable: true
        data_table:
          type: string
        collect_cycle:
          type: string
        metrics:
          type: string
        usage_guide:
          type: string
    UpdateAppRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, inactive]
        is_published:
          type: boolean
        avg_runtime_minutes:
          type: integer
        ops_owner:
          type: string
        need_extra_params:
          type: boolean
        platform_preview_url:
          type: string
          nullable: true
        data_table:
          type: string
        collect_cycle:
          type: string
        metrics:
          type: string
        usage_guide:
          type: string

    AdapterItem:
      type: object
      required: [adapter_key, platform_code, display_name, description, default_version, is_listed, listed_apps]
      properties:
        adapter_key:
          type: string
          example: taobao.order_sync
        platform_code:
          type: string
          example: taobao
        display_name:
          type: string
          example: 订单数据采集
        description:
          type: string
          example: 采集淘宝天猫订单数据
        default_version:
          type: string
          example: 1.0.0
        is_listed:
          type: boolean
          description: 是否已有 active 状态的上架应用
        listed_apps:
          type: array
          items:
            type: object
            required: [id, name, status]
            properties:
              id:
                type: integer
              name:
                type: string
              status:
                type: string
                enum: [active, inactive]

    PlatformItem:
      type: object
      required: [id, code, name, parent_id, level]
      properties:
        id:
          type: integer
        code:
          type: string
        name:
          type: string
        parent_id:
          type: integer
          nullable: true
        level:
          type: integer
          enum: [1, 2]
    AppResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/App"

    AppsResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/App"

    AccountResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/Account"

    AccountsResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Account"

    TaskResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/Task"

    TasksResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Task"

    RunTriggerResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          properties:
            data:
              type: object
              required: [task_id, run_id, queued]
              properties:
                task_id:
                  type: integer
                run_id:
                  type: integer
                queued:
                  type: boolean

    TaskRunsResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/TaskRun"

    RunLogsResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          properties:
            data:
              type: object
              properties:
                run_id:
                  type: integer
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      step:
                        type: string
                      level:
                        type: string
                        enum: [INFO, WARN, ERROR]
                      message:
                        type: string
                      ts:
                        type: string
                        format: date-time

    AvailableAdaptersResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/AdapterItem"
    PlatformsResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/PlatformItem"

